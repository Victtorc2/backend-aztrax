# Configuración de Alembic para las migraciones del sistema.
# La URL de la base de datos NO se fija aquí: se inyecta dinámicamente
# desde app/core/config.py dentro de alembic/env.py.

[alembic]
# Ubicación de los scripts de migración.
script_location = alembic

# Plantilla para el nombre de los archivos de migración (incluye fecha).
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Zona horaria para los timestamps de las migraciones.
timezone = UTC

prepend_sys_path = .

[post_write_hooks]

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
